<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Cs/engine/assets/hl-bright-BcANNclR.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS 1.6 - WebXash</title>
    <link rel="stylesheet" crossorigin href="/Cs/engine/assets/index-b_7h_EiO.css">
    <style>
      body, html { margin: 0; padding: 0; background: #0a0a0a; overflow: hidden; }
      #loader-screen {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
        z-index: 999999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: 'Segoe UI', Arial, sans-serif; color: #e0e0e0;
      }
      #loader-screen h1 {
        font-size: 36px; color: #39ff14; text-shadow: 0 0 20px rgba(57,255,20,0.4);
        margin-bottom: 8px;
      }
      #loader-screen .subtitle { color: #888; font-size: 14px; margin-bottom: 40px; }
      #loader-screen .start-btn {
        padding: 16px 48px; font-size: 20px; font-weight: bold;
        background: linear-gradient(135deg, #39ff14, #00e676); color: #000;
        border: none; border-radius: 12px; cursor: pointer;
        box-shadow: 0 4px 30px rgba(57,255,20,0.3);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      #loader-screen .start-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 40px rgba(57,255,20,0.5);
      }
      #loader-screen .start-btn:disabled {
        background: #333; color: #666; cursor: not-allowed;
        box-shadow: none; transform: none;
      }
      .progress-container { width: 420px; margin-top: 30px; display: none; }
      .progress-bg {
        width: 100%; height: 22px; background: #1a1a2e;
        border: 1px solid #39ff14; border-radius: 11px; overflow: hidden;
      }
      .progress-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #39ff14, #00e676);
        border-radius: 11px; transition: width 0.3s ease;
      }
      .status-text { color: #aaa; font-size: 13px; margin-top: 10px; text-align: center; }
      .error-text { color: #ff4444; font-size: 13px; margin-top: 8px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="loader-screen">
      <h1>🎮 COUNTER-STRIKE 1.6</h1>
      <p class="subtitle">Brauzerdə birbaşa oyna — heç nə yükləmədən!</p>
      <button class="start-btn" id="startBtn" onclick="window._startGame()">▶ OYUNU BAŞLAT</button>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bg">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText"></div>
        <div class="error-text" id="errorText"></div>
      </div>
    </div>
    <script>
      // Get multiplayer IP from URL parameter if present
      var urlParams = new URLSearchParams(window.location.search);
      var ipParam = urlParams.get('ip');
      if (ipParam) {
        window.multiplayerIP = ipParam;
      }

      window._startGame = async function() {
        var btn = document.getElementById('startBtn');
        var progContainer = document.getElementById('progressContainer');
        var progFill = document.getElementById('progressFill');
        var statusEl = document.getElementById('statusText');
        var errorEl = document.getElementById('errorText');

        btn.disabled = true;
        btn.textContent = 'Yüklənir...';
        progContainer.style.display = 'block';
        errorEl.textContent = '';

        try {
          // Step 1: Download all parts of the game ZIP
          var partsCount = 3;
          var buffers = [];
          var totalBytes = 0;
          
          for (var i = 1; i <= partsCount; i++) {
            statusEl.textContent = 'Oyun faylları yüklənir: Hissə ' + i + ' / ' + partsCount + '...';
            progFill.style.width = Math.round(((i - 1) / partsCount) * 70) + 10 + '%';

            var response = await fetch('cs/cstrike_game.part_' + i);
            if (!response.ok) throw new Error('Hissə ' + i + ' yüklənə bilmədi (HTTP ' + response.status + ')');
            
            var buf = await response.arrayBuffer();
            buffers.push(new Uint8Array(buf));
            totalBytes += buf.byteLength;
          }

          progFill.style.width = '82%';
          statusEl.textContent = 'Fayllar birləşdirilir...';

          // Combine chunks
          var zipData = new Uint8Array(totalBytes);
          var pos = 0;
          for (var c of buffers) { zipData.set(c, pos); pos += c.length; }
          buffers = null;

          progFill.style.width = '88%';
          statusEl.textContent = 'WebXash mühərriki yüklənir...';

          // Step 2: Set scriptDir for CS mode
          window.scriptDir = 'cs/';

          // Step 3: Load Vue/WebXash app
          var script = document.createElement('script');
          script.type = 'module';
          script.crossOrigin = '';
          script.src = './assets/index-qQhwzMp6.js';
          document.head.appendChild(script);

          // Step 4: Wait for Vue app and file input
          var fileInput = null;
          for (var attempt = 0; attempt < 60; attempt++) {
            await new Promise(function(r) { setTimeout(r, 300); });
            fileInput = document.querySelector('input[type="file"][accept=".zip"]');
            if (fileInput) break;
          }
          if (!fileInput) throw new Error('Mühərrik yüklənə bilmədi!');

          progFill.style.width = '94%';
          statusEl.textContent = 'Oyun mühərrikə ötürülür...';

          // Step 5: Feed ZIP to the Open ZIP handler
          var blob = new Blob([zipData], { type: 'application/zip' });
          zipData = null;
          var file = new File([blob], 'cstrike_game.zip', { type: 'application/zip' });

          var dt = new DataTransfer();
          dt.items.add(file);
          fileInput.files = dt.files;
          fileInput.dispatchEvent(new Event('change', { bubbles: true }));

          progFill.style.width = '100%';
          statusEl.textContent = 'Counter-Strike 1.6 başladılır...';

          // We don't hide the loader automatically so the user can see any console output during startup
          setTimeout(function() {
            document.getElementById('loader-screen').style.display = 'none';
          }, 8000);

        } catch(err) {
          errorEl.textContent = 'Xəta: ' + err.message;
          btn.disabled = false;
          btn.textContent = '🔄 Yenidən Cəhd Et';
          progContainer.style.display = 'none';
        }
      };
    </script>
  </body>
</html>
